services:
  postgres:
    image: postgres:16-alpine
    container_name: moju-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: moju
      POSTGRES_PASSWORD: moju_local
      POSTGRES_DB: moju
    ports:
      - "5432:5432"
    volumes:
      - moju_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moju -d moju"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  moju_postgres_data:
